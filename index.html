<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="EUB Admissions Pipeline Database login portal.">
    <title>EUB Admissions Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://alcdn.msauth.net/browser/2.38.2/js/msal-browser.min.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="light-theme auth-only" data-page="login">
    <section id="authScreen" class="auth-screen visible" aria-labelledby="authTitle">
        <div class="auth-card">
            <div class="auth-branding">
                <div class="auth-logo">
                    <i class="fa-solid fa-graduation-cap"></i>
                </div>
                <div>
                    <p class="auth-eyebrow">Euro University of Bahrain</p>
                    <h1 id="authTitle">Admissions Pipeline Database</h1>
                </div>
            </div>

            <p class="auth-copy">
                Sign in with your Microsoft 365 work account to continue to the admissions management dashboard.
            </p>

            <div class="auth-actions">
                <button id="microsoftLoginBtn" class="btn btn-primary auth-button" type="button">
                    <i class="fa-brands fa-microsoft"></i>
                    Sign in with Microsoft 365
                </button>
                <p id="authStatusText" class="auth-status">Waiting for Microsoft sign-in.</p>
            </div>
        </div>
    </section>

    <script src="auth-config.js"></script>
    <script src="app.js"></script>
</body>
</html>
